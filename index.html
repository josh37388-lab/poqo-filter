<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>POQO Video Filter</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#111;overflow:hidden;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:#e0e0e0}
#app{display:flex;flex-direction:column;height:calc(100vh - 56px);margin-top:56px;background:#111}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #222;flex-shrink:0}
.logo{font-size:18px;font-weight:700;color:#c75b39;letter-spacing:2px;font-family:"Courier New",monospace}
.sub{font-size:11px;color:#555;margin-left:8px}
.openbtn{padding:8px 16px;background:#1e1e1e;border:1px solid #333;border-radius:6px;color:#bbb;font-size:13px;cursor:pointer;-webkit-appearance:none}
.preview{flex:1;display:flex;align-items:center;justify-content:center;margin:8px 12px 6px;border-radius:6px;background:#000;overflow:hidden;position:relative;min-height:0}
.empty{text-align:center;color:#3a3a3a;padding:20px}
.eicon{font-size:34px;margin-bottom:10px;opacity:0.35}
.etxt{font-size:14px;color:#444}
.ehint{font-size:11px;color:#2a2a2a;margin-top:5px;font-family:"Courier New",monospace}
/* Canvas fills the preview box */
#out{display:none;max-width:100%;max-height:100%}
.recbadge{display:none;align-items:center;gap:5px;position:absolute;top:9px;right:9px;background:rgba(0,0,0,0.72);padding:3px 9px;border-radius:3px;font-size:10px;color:#ff5555;font-family:"Courier New",monospace;z-index:10}
.recbadge.on{display:flex}
.dot{width:6px;height:6px;background:#ff5555;border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.ctrls{background:#161616;border-radius:8px;padding:9px 12px;margin:0 12px 6px;border:1px solid #1e1e1e;flex-shrink:0}
.crow{display:flex;gap:12px;margin-bottom:7px}
.cg{flex:1}
.ctop{display:flex;justify-content:space-between;margin-bottom:2px}
.cl{font-size:10px;color:#666}
.cv{font-size:10px;color:#555;font-family:"Courier New",monospace}
input[type=range]{width:100%;accent-color:#c75b39;height:20px;cursor:pointer;touch-action:manipulation}
.cbot{display:flex;justify-content:space-between;font-size:9px;color:#333}
.tsrow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.tsl{font-size:10px;color:#666;white-space:nowrap}
.tsi{flex:1;padding:5px 7px;background:#0d0d0d;border:1px solid #252525;border-radius:4px;color:#bbb;font-family:"Courier New",monospace;font-size:11px;outline:none;-webkit-appearance:none}
.btnrow{display:flex;justify-content:flex-end;align-items:center}
.xbtn{padding:8px 22px;background:#c75b39;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.xbtn.stop{background:#7a3520}
.iosnote{font-size:10px;color:#555;font-family:"Courier New",monospace;text-align:right;line-height:1.6}
.stat{font-size:10px;color:#333;padding:2px 16px 8px;font-family:"Courier New",monospace;flex-shrink:0;min-height:20px}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div><span class="logo">POQO</span><span class="sub">Video Filter</span></div>
    <button class="openbtn" id="btnOpen">Open Video</button>
    <input type="file" id="fileIn" accept="video/*" style="display:none">
  </div>
  <div class="preview">
    <div class="empty" id="empty">
      <div class="eicon">🎬</div>
      <div class="etxt">Tap Open Video to start</div>
      <div class="ehint">MP4 · MOV · Reels &amp; TikTok</div>
    </div>
    <canvas id="out"></canvas>
    <div class="recbadge" id="recBadge"><div class="dot"></div>REC</div>
  </div>
  <div class="ctrls">
    <div class="crow">
      <div class="cg">
        <div class="ctop"><span class="cl">Vignette</span><span class="cv" id="vLbl">100%</span></div>
        <input type="range" id="sVig" min="0" max="2" step="0.05" value="1.0">
        <div class="cbot"><span>flat</span><span>dark edges</span></div>
      </div>
      <div class="cg">
        <div class="ctop"><span class="cl">Coolness</span><span class="cv" id="cLbl">100%</span></div>
        <input type="range" id="sCool" min="0" max="2" step="0.05" value="1.0">
        <div class="cbot"><span>neutral</span><span>cold</span></div>
      </div>
    </div>
    <div class="tsrow">
      <span class="tsl">Timestamp</span>
      <input type="text" id="tsIn" class="tsi" placeholder="YYYY/MM/DD  HH:MM:SS">
    </div>
    <div class="btnrow" id="exportArea"></div>
  </div>
  <div class="stat" id="stat">vive un poco</div>
</div>

<video id="vid" playsinline muted loop webkit-playsinline style="display:none"></video>
<canvas id="tmpC" style="display:none"></canvas>

<script>
const vid=document.getElementById('vid');
const out=document.getElementById('out');
const tmpC=document.getElementById('tmpC');
const empty=document.getElementById('empty');
const recBadge=document.getElementById('recBadge');
const statEl=document.getElementById('stat');
const btnOpen=document.getElementById('btnOpen');
const fileIn=document.getElementById('fileIn');
const sVig=document.getElementById('sVig');
const sCool=document.getElementById('sCool');
const tsIn=document.getElementById('tsIn');
const exportArea=document.getElementById('exportArea');
const vLbl=document.getElementById('vLbl');
const cLbl=document.getElementById('cLbl');

let ctx, tCtx;
let hasVideo=false, rafId=null;
let vigAmt=1.0, coolAmt=1.0, autoTs='';
let recorder=null, chunks=[], isRec=false, canExport=false;
let W=0, H=0;

// Output canvas is 16:9, displayed with black bars (letterbox) like real poqo
// Canvas width = preview width, height = width * 9/16
// Surrounded by black background of preview div

function setStatus(s){statEl.textContent=s;}

function gauss(){
  let u=0,v=0;
  while(!u)u=Math.random();
  while(!v)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

// Small digital noise — like a real cheap sensor, not heavy film grain
const noiseC=document.createElement('canvas');
let nCtx=null, lastNoise=0;
function refreshNoise(){
  const nW=Math.ceil(W/6), nH=Math.ceil(H/6);
  if(noiseC.width!==nW||noiseC.height!==nH){
    noiseC.width=nW; noiseC.height=nH;
    nCtx=noiseC.getContext('2d');
  }
  const id=nCtx.createImageData(nW,nH), d=id.data;
  // Light digital noise std ~12 — subtle, like a real cheap sensor
  const std=12;
  for(let i=0;i<d.length;i+=4){
    const n=(gauss()*std+128)|0, v=n<0?0:n>255?255:n;
    d[i]=d[i+1]=d[i+2]=v; d[i+3]=28;
  }
  nCtx.putImageData(id,0,0);
}

function renderFrame(){
  rafId=requestAnimationFrame(renderFrame);
  if(!hasVideo||vid.readyState<2)return;

  // 1. Draw video to tmpC with colour grade
  // Real poqo: cool blue-grey, lifted blacks, slight desaturation, minimal blur
  const blurPx=(0.8).toFixed(1); // very slight softness only
  const cool=coolAmt;
  tCtx.filter=`blur(${blurPx}px) contrast(0.85) brightness(1.12) saturate(0.80) hue-rotate(${(-15*cool).toFixed(0)}deg)`;
  tCtx.drawImage(vid,0,0,W,H);
  tCtx.filter='none';

  // 2. Copy to output
  ctx.drawImage(tmpC,0,0);

  // 3. Heavy radial vignette — this is the dominant visual effect in real poqo
  // Very dark edges, bright centre — matches reference screenshots exactly
  const vig=vigAmt;
  const grad=ctx.createRadialGradient(W*0.5,H*0.5,H*0.05, W*0.5,H*0.5,H*0.72);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(0.45,'rgba(0,0,0,0)');
  grad.addColorStop(0.75,`rgba(0,0,0,${(0.45*vig).toFixed(2)})`);
  grad.addColorStop(1,`rgba(0,0,0,${(0.88*vig).toFixed(2)})`);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,W,H);

  // 4. Subtle digital noise (not heavy grain)
  const now=performance.now();
  if(now-lastNoise>120){
    lastNoise=now;
    refreshNoise();
  }
  if(nCtx){
    ctx.globalAlpha=0.30;
    ctx.drawImage(noiseC,0,0,W,H);
    ctx.globalAlpha=1;
  }

  // 5. Timestamp — small, bottom left, white, exactly like reference
  const ts=tsIn.value.trim()||autoTs;
  if(ts){
    const sc=W/1000;
    const fs=Math.max(10,Math.round(16*sc));
    ctx.font=`bold ${fs}px "Courier New",Courier,monospace`;
    ctx.textBaseline='bottom';
    const tx=Math.round(8*sc), ty=H-Math.round(10*sc);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.fillText(ts,tx+1,ty+1);
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.fillText(ts,tx,ty);
  }
}

function setupCanvases(vw,vh){
  // Cap width for mobile performance
  const maxW=window.innerWidth<=428?480:800;
  W=Math.min(vw,maxW);
  H=Math.round(vh*(W/vw));
  out.width=W; out.height=H;
  tmpC.width=W; tmpC.height=H;
  ctx=out.getContext('2d');
  tCtx=tmpC.getContext('2d');
}

function loadVideo(file){
  setStatus('Loading…');
  hasVideo=false;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  const d=new Date(file.lastModified), p=n=>String(n).padStart(2,'0');
  autoTs=`${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())}  ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
  tsIn.value=autoTs;
  vid.src=URL.createObjectURL(file);
  vid.load();
  vid.onloadedmetadata=()=>{
    setupCanvases(vid.videoWidth,vid.videoHeight);
    vid.play().then(()=>{
      hasVideo=true;
      empty.style.display='none';
      out.style.display='block';
      setStatus(`${vid.videoWidth}×${vid.videoHeight} · ${(file.size/1e6).toFixed(1)}MB`);
      rafId=requestAnimationFrame(renderFrame);
      canExport=typeof MediaRecorder!=='undefined'&&
        ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].some(t=>MediaRecorder.isTypeSupported(t));
      renderExport();
    }).catch(e=>{setStatus('Playback error — try a different clip');console.error(e);});
  };
  vid.onerror=()=>setStatus('Could not load — try MP4 or MOV');
}

function renderExport(){
  exportArea.innerHTML='';
  if(canExport){
    const btn=document.createElement('button');
    btn.className='xbtn'+(isRec?' stop':'');
    btn.textContent=isRec?'Stop & Save':'Export WebM';
    btn.onclick=isRec?stopExport:startExport;
    exportArea.appendChild(btn);
  } else {
    const n=document.createElement('span');
    n.className='iosnote';
    n.innerHTML='Preview on iOS —<br>screen record to save';
    exportArea.appendChild(n);
  }
}

function startExport(){
  const mime=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(t=>MediaRecorder.isTypeSupported(t));
  const stream=out.captureStream(30);
  chunks=[];
  recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:12000000});
  recorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  recorder.onstop=saveExport;
  vid.loop=false; vid.currentTime=0; vid.play();
  vid.onended=stopExport;
  recorder.start(200);
  isRec=true; recBadge.classList.add('on');
  renderExport();
  setStatus('Recording… saves automatically at clip end');
}
function stopExport(){
  if(recorder&&recorder.state!=='inactive')recorder.stop();
  vid.loop=true; vid.onended=null;
  isRec=false; recBadge.classList.remove('on');
  renderExport(); setStatus('Saving…');
}
function saveExport(){
  const blob=new Blob(chunks,{type:'video/webm'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='poqo_filtered.webm';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  setStatus(`Saved · ${(blob.size/1e6).toFixed(1)}MB`);
}

btnOpen.onclick=()=>fileIn.click();
fileIn.onchange=e=>{const f=e.target.files?.[0];if(f)loadVideo(f);e.target.value='';};
sVig.oninput=()=>{vigAmt=parseFloat(sVig.value);vLbl.textContent=Math.round(vigAmt*100)+'%';};
sCool.oninput=()=>{coolAmt=parseFloat(sCool.value);cLbl.textContent=Math.round(coolAmt*100)+'%';};
tsIn.oninput=()=>{};
</script>
</body>
</html>
